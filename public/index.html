<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Calculator</title>

<style>

body{
font-family: Arial, sans-serif;
background:#000;
color:white;
text-align:center;
margin:0;
padding:20px;
}

.container{
max-width:420px;
margin:auto;
}

h1{
font-size:24px;
margin-bottom:5px;
}

.subtitle{
color:#bbb;
font-size:14px;
margin-bottom:20px;
}

.card{
background:white;
color:black;
padding:25px;
border-radius:20px;
box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.amount{
font-size:28px;
margin:10px 0;
}

.slider{
width:100%;
}

.labels{
display:flex;
justify-content:space-between;
font-size:12px;
color:#888;
margin-top:5px;
}

.term-buttons{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
margin-top:15px;
}

.term{
padding:10px;
border-radius:10px;
background:#eee;
border:none;
cursor:pointer;
}

.term.active{
background:linear-gradient(90deg,#ff9800,#ff7043);
color:white;
}

.result{
background:#f1f1f1;
padding:20px;
border-radius:15px;
margin-top:20px;
}

.payment{
font-size:26px;
margin-top:5px;
}

.apply{
margin-top:20px;
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:18px;
color:white;
cursor:pointer;
background:linear-gradient(90deg,#ff9800,#ff7043);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.info{
background:#f5f5f5;
margin-top:15px;
padding:15px;
border-radius:15px;
display:flex;
align-items:center;
gap:15px;
}

.icon{
width:40px;
height:40px;
border-radius:50%;
background:#4a2c6b;
display:flex;
align-items:center;
justify-content:center;
color:white;
font-size:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Get Your Loan Approved Fast</h1>
<div class="subtitle">Quick approval • Competitive rates • Flexible terms</div>

<div class="card">

<h2>Loan Calculator</h2>

<p>LOAN AMOUNT</p>
<div class="amount" id="loanAmount">LRD 5,000</div>

<input type="range" min="5000" max="2000000" value="5000" step="1000" class="slider" id="loanSlider">

<div class="labels">
<span>LRD 5,000</span>
<span>LRD 2,000,000</span>
</div>

<h3 style="margin-top:20px;">Loan Term</h3>

<div id="months">12 months</div>

<div class="term-buttons">
<button class="term" data-month="6">6 months</button>
<button class="term active" data-month="12">12 months</button>
<button class="term" data-month="24">24 months</button>
<button class="term" data-month="36">36 months</button>
<button class="term" data-month="48">48 months</button>
<button class="term" data-month="60">60 months</button>
</div>

<div class="result">
<div>MONTHLY PAYMENT</div>
<div class="payment" id="payment">LRD 0</div>
<div style="font-size:12px;color:#777;">Interest rate: 4.5% APR</div>
</div>

<button class="apply" onclick="applyLoan()">APPLY NOW</button>

<div class="info">
<div class="icon">⚡</div>
<div>
<b>Fast Approval</b><br>
<small>Within 24 hours</small>
</div>
</div>

<div class="info">
<div class="icon">💰</div>
<div>
<b>Low Rates</b><br>
<small>From 8%</small>
</div>
</div>

</div>

</div>

<script>

let slider = document.getElementById("loanSlider");
let loanAmount = document.getElementById("loanAmount");
let payment = document.getElementById("payment");
let monthsDisplay = document.getElementById("months");

let months = 12;
const rate = 0.045/12;

function calculate(){

let P = slider.value;
let n = months;
let r = rate;

let M = (P*r)/(1-Math.pow((1+r),-n));

loanAmount.innerText = "LRD " + Number(P).toLocaleString();
payment.innerText = "LRD " + M.toFixed(2);

}

slider.oninput = calculate;

document.querySelectorAll(".term").forEach(btn=>{
btn.onclick = function(){

document.querySelectorAll(".term").forEach(b=>b.classList.remove("active"));
this.classList.add("active");

months = this.dataset.month;

monthsDisplay.innerText = months + " months";

calculate();

}
})

function applyLoan(){

window.location.href="details.html";

}

calculate();

</script>

</body>
</html>
